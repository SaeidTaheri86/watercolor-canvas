<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6em;
      color: #a0c4ff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 12px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      color: transparent;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #ff6b6b;
    }

    .cell.o {
      color: #a0c4ff;
    }

    .cell.win {
      background: #0f3460;
      border-color: #e2b96f;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.65rem 1.8rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    #restart {
      background: #e2b96f;
      color: #1a1a2e;
    }

    #modeToggle {
      background: #0f3460;
      color: #a0c4ff;
      border: 2px solid #a0c4ff;
    }

    #scoreboard {
      margin-top: 1.8rem;
      display: flex;
      gap: 2.5rem;
      font-size: 1rem;
      color: #ccc;
    }

    .score-item {
      text-align: center;
    }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="modeToggle">vs CPU</button>
  </div>
  <div id="scoreboard">
    <div class="score-item">X <span id="scoreX">0</span></div>
    <div class="score-item">Draws <span id="scoreDraw">0</span></div>
    <div class="score-item">O <span id="scoreO">0</span></div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeToggleBtn = document.getElementById('modeToggle');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');
    const scoreDrawEl = document.getElementById('scoreDraw');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsCPU;
    let scores = { X: 0, O: 0, Draw: 0 };
    let cells = [];

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      boardEl.innerHTML = '';
      cells = [];

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', onCellClick);
        boardEl.appendChild(cell);
        cells.push(cell);
      }

      setStatus(`${current}'s turn`);

      if (vsCPU && current === 'O') {
        setTimeout(cpuMove, 400);
      }
    }

    function onCellClick(e) {
      const i = +e.currentTarget.dataset.i;
      if (gameOver || board[i]) return;
      if (vsCPU && current === 'O') return;
      play(i);
    }

    function play(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const winner = checkWinner();
      if (winner) {
        endGame(winner);
      } else if (board.every(Boolean)) {
        endGame(null);
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`);
        if (vsCPU && current === 'O') {
          setTimeout(cpuMove, 350);
        }
      }
    }

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { player: board[a], line: [a, b, c] };
        }
      }
      return null;
    }

    function endGame(winner) {
      gameOver = true;
      if (winner) {
        winner.line.forEach(i => cells[i].classList.add('win'));
        setStatus(`${winner.player} wins!`);
        scores[winner.player]++;
      } else {
        setStatus("It's a draw!");
        scores.Draw++;
      }
      updateScores();
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function updateScores() {
      scoreXEl.textContent = scores.X;
      scoreOEl.textContent = scores.O;
      scoreDrawEl.textContent = scores.Draw;
    }

    // --- CPU (minimax) ---
    function cpuMove() {
      const move = bestMove();
      if (move !== null) play(move);
    }

    function bestMove() {
      let best = -Infinity, idx = null;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; idx = i; }
        }
      }
      return idx;
    }

    function minimax(b, depth, isMax) {
      const w = checkWinner();
      if (w) return w.player === 'O' ? 10 - depth : depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = null;
          }
        }
        return best;
      }
    }

    restartBtn.addEventListener('click', init);

    modeToggleBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeToggleBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      scores = { X: 0, O: 0, Draw: 0 };
      updateScores();
      init();
    });

    vsCPU = false;
    init();
  </script>
</body>
</html>
